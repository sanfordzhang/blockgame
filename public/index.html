  <style>
    :root {
      box-sizing: border-box;
    }

    *,
    *::before,
    *::after {
      box-sizing: inherit;
    }

    * {
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100%;
      background-color: hsl(41, 41%, 86%);
    }

    .loading-screen {
      width: 100%;
      padding: 0 1.5rem;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      background-color: black;
    }

    .no-script {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .no-script img {
      width: 100%;
      max-width: 320px;
    }

    .no-script p {
      font-size: 1.5rem;
      font-family: 'Roboto', sans-serif;
      color: hsl(36, 71%, 3%);
      text-align: center;
      margin-top: 3rem;
      padding: 1rem 2rem;
      background-color: hsl(49, 63%, 92%);
      border-radius: 2rem;
    }

    .custom-loader {
      transform: scale(1);
      animation: pulse 0.75s infinite;
    }

    @keyframes pulse {
      0% {
        transform: scale(0.85);
      }

      70% {
        transform: scale(1.25);
      }

      100% {
        transform: scale(0.85);
      }
    }

    #root,
    #cookie-banner {
      opacity: 0;
      animation: fade-in 0.75s ease-out forwards;
    }

    @keyframes fade-in {
      100% {
        opacity: 1;
      }
    }

    /* Loading screen shown before React bundle loads */
    #app-loading {
      position: fixed;
      inset: 0;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.4s ease;
    }
    #app-loading.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #app-loading .logo-text {
      color: #24516a;
      font-size: 2rem;
      font-family: sans-serif;
      font-weight: 700;
      letter-spacing: 0.1em;
      margin-bottom: 2rem;
    }
    #app-loading .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(36,81,106,0.2);
      border-top-color: #24516a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    #app-loading .hint {
      margin-top: 1.5rem;
      color: rgba(255,255,255,0.4);
      font-size: 0.8rem;
      font-family: sans-serif;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body>
  <div id="app-loading">
    <div class="logo-text">QEntrix</div>
    <div class="spinner"></div>
    <div class="hint">Loading...</div>
  </div>
  <div id="root" style="display: none;"></div>
  <div id="cookie-banner" style="display: none;"></div>
  <div id="modal"></div>
  <script>
    // Hide loading screen once React mounts (#root becomes visible)
    var observer = new MutationObserver(function() {
      var root = document.getElementById('root');
      if (root && root.style.display !== 'none') {
        var loader = document.getElementById('app-loading');
        if (loader) {
          loader.classList.add('hidden');
          setTimeout(function() { loader.remove(); }, 400);
        }
        observer.disconnect();
      }
    });
    observer.observe(document.getElementById('root'), { attributes: true, attributeFilter: ['style'] });
  </script>
</body>

</html>
